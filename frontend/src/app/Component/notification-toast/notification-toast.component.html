<div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none">
  <div *ngFor="let n of notifications$ | async"
       class="pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-xl text-white shadow-lg
              transition-all duration-300 animate-fade-in"
       [ngClass]="getTypeClass(n.type)">

    <!-- Icon -->
    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-white bg-opacity-20 flex items-center justify-center text-sm font-bold">
      {{ getTypeIcon(n.type) }}
    </span>

    <!-- Message -->
    <p class="flex-1 text-sm leading-snug pt-0.5">{{ n.message }}</p>

    <!-- Dismiss -->
    <button (click)="dismiss(n.id)"
            class="flex-shrink-0 ml-1 text-white text-opacity-70 hover:text-opacity-100 focus:outline-none">
      ✕
    </button>
  </div>
</div>
